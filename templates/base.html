<script>
function toPersianDigits(str) {
    return str.replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
}

function convertTextNodes(node, ignoreId) {
    // اگر نود یا یکی از والدهایش id مشخص‌شده را دارد، هیچ کاری نکن
    if (node.id === ignoreId || (node.closest && node.closest('#' + ignoreId))) {
        return;
    }

    if (node.nodeType === 3) {
        node.nodeValue = toPersianDigits(node.nodeValue);
    } else {
        node.childNodes.forEach(child => convertTextNodes(child, ignoreId));
    }
}

document.addEventListener("DOMContentLoaded", function() {
    convertTextNodes(document.body, 'no-persian');
});
</script>
